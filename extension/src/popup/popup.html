<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyMovie</title>
    <style>
      /* TIP-022 — Design tokens extension (theme sáng, đồng bộ web). */
      :root {
        --primary: #111827;
        --primary-hover: #1f2937;
        --primary-foreground: #ffffff;
        --accent: #f5b301;
        --fg: #111827;
        --muted: #6b7280;
        --border: #e5e7eb;
        --surface: #ffffff;
        --surface-muted: #f3f4f6;
        --radius-card: 16px;
        --radius-btn: 10px;
        --danger: #dc2626;
        --success: #16a34a;
        --shadow-card: 0 1px 3px rgb(0 0 0 / 0.08), 0 1px 2px rgb(0 0 0 / 0.06);
      }
      * { box-sizing: border-box; }
      body {
        width: 330px;
        margin: 0;
        padding: 14px;
        font-family: "Inter", ui-sans-serif, system-ui, "Segoe UI", sans-serif;
        color: var(--fg);
        background: var(--background, #fafafa);
      }
      .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 8px; color: var(--fg); }
      .logo .dot { color: var(--accent); }
      .muted { color: var(--muted); font-size: 13px; }
      /* Card chung */
      .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-card); padding: 14px; box-shadow: var(--shadow-card); margin-bottom: 12px; }
      .row { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
      .row.clickable { cursor: pointer; border-radius: var(--radius-btn); padding: 6px; margin: 4px -6px; transition: background 0.12s; }
      .row.clickable:hover { background: var(--surface-muted); }
      .avatar { width: 36px; height: 36px; border-radius: 999px; object-fit: cover; background: var(--primary); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; }
      .email { font-size: 14px; font-weight: 500; word-break: break-all; }
      .status { font-size: 13px; margin: 8px 0; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-btn); }
      .status.expired { color: var(--danger); border-color: var(--danger); }
      .btn { width: 100%; border: 0; border-radius: var(--radius-btn); padding: 10px 12px; font-size: 14px; font-weight: 600; cursor: pointer; background: var(--primary); color: var(--primary-foreground); margin-top: 8px; }
      .btn:hover { background: var(--primary-hover); }
      .btn.ghost { background: transparent; color: var(--fg); border: 1px solid var(--border); font-weight: 500; }
      .btn:disabled { opacity: 0.45; cursor: not-allowed; }
      /* Timer (TIP-014) — card trắng, time lớn, 2 nút TRÒN */
      .timer-card { text-align: center; }
      .timer-label { font-size: 15px; font-weight: 700; }
      .timer-time { font-size: 34px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: 1px; margin: 2px 0 12px; color: var(--muted); }
      .timer-controls { display: flex; justify-content: center; gap: 28px; }
      .tbtn-wrap { display: flex; flex-direction: column; align-items: center; gap: 5px; }
      .tbtn { width: 52px; height: 52px; margin: 0; border-radius: 999px; border: 1px solid var(--border); background: var(--surface-muted); color: var(--fg); font-size: 18px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
      .tbtn:hover:not(:disabled) { background: #e9eaee; }
      .tbtn:disabled { opacity: 0.4; cursor: not-allowed; }
      .tbtn-label { font-size: 12px; color: var(--muted); }
      /* Card chế độ phụ đề (TIP-015 controls, restyle TIP-022) */
      .set-title { font-size: 15px; font-weight: 700; text-align: center; margin-bottom: 10px; }
      .set-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 9px 0; }
      .set-label { font-size: 13px; }
      .set-val { font-size: 13px; font-variant-numeric: tabular-nums; min-width: 40px; text-align: right; }
      .set-slider { flex: 1; accent-color: var(--primary); }
      /* switch toggle */
      .switch { position: relative; display: inline-block; width: 38px; height: 22px; flex: none; }
      .switch input { opacity: 0; width: 0; height: 0; }
      .switch-slider { position: absolute; inset: 0; cursor: pointer; background: var(--border); border-radius: 999px; transition: 0.18s; }
      .switch-slider::before { content: ""; position: absolute; height: 16px; width: 16px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: 0.18s; }
      .switch input:checked + .switch-slider { background: var(--primary); }
      .switch input:checked + .switch-slider::before { transform: translateX(16px); }
      /* Tabs chế độ (segmented) */
      .seg { display: flex; gap: 4px; background: var(--surface-muted); border-radius: var(--radius-btn); padding: 3px; margin-bottom: 10px; }
      .seg-btn { flex: 1; border: 0; background: none; border-radius: 7px; padding: 6px 4px; font-size: 13px; color: var(--muted); cursor: pointer; }
      .seg-btn.active { background: var(--surface); color: var(--fg); font-weight: 600; box-shadow: var(--shadow-card); }
      /* Chấm chọn màu chữ */
      .dots { display: inline-flex; gap: 8px; }
      .dot-btn { width: 18px; height: 18px; border-radius: 999px; cursor: pointer; padding: 0; border: 1px solid var(--border); }
      .dot-btn.dot-white { background: #ffffff; }
      .dot-btn.dot-black { background: #000000; }
      .dot-btn.dot-yellow { background: #f5c518; border-color: #f5c518; }
      .dot-btn.sel { outline: 2px solid var(--primary); outline-offset: 1px; }
      /* stepper − [px] + */
      .stepper { display: inline-flex; align-items: center; gap: 8px; }
      .step-btn { width: 28px; height: 28px; border: 1px solid var(--border); background: var(--surface); border-radius: var(--radius-btn); font-size: 16px; font-weight: 600; cursor: pointer; color: var(--fg); line-height: 1; }
      .step-btn:hover:not(:disabled) { background: var(--surface-muted); }
      .step-btn:disabled { opacity: 0.4; cursor: not-allowed; }
      /* Auth email/mật khẩu (TIP-027) */
      .auth-title { font-size: 18px; font-weight: 700; text-align: center; margin: 4px 0 10px; }
      .auth-input { width: 100%; border: 1px solid var(--border); border-radius: var(--radius-btn); padding: 10px 12px; font-size: 14px; margin-bottom: 8px; color: var(--fg); background: var(--surface); }
      .auth-input:focus { outline: 2px solid var(--primary); outline-offset: -1px; }
      .auth-msg { font-size: 13px; margin: 8px 0; padding: 8px 10px; border-radius: var(--radius-btn); }
      .auth-msg.err { color: var(--danger); background: #fee2e2; }
      .auth-msg.ok { color: var(--success); background: #dcfce7; }
      .auth-link { width: auto; margin: 6px auto 0; padding: 4px; display: block; background: none; border: 0; color: var(--muted); font-size: 13px; cursor: pointer; }
      .auth-link:hover { color: var(--fg); background: none; }
      .auth-divider { display: flex; align-items: center; text-align: center; color: var(--muted); font-size: 12px; margin: 12px 0 8px; }
      .auth-divider::before, .auth-divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
      .auth-divider span { padding: 0 10px; }
      /* TIP-052 — Đăng nhập/Đăng ký theo Figma */
      .auth-tabs { display: flex; gap: 4px; background: #f3f4f6; border-radius: 10px; padding: 4px; margin-bottom: 12px; }
      .auth-tab { flex: 1; width: auto; margin: 0; border: 0; border-radius: 7px; padding: 8px 6px; font-size: 13px; font-weight: 600; cursor: pointer; background: transparent; color: var(--muted); }
      .auth-tab.active { background: var(--surface); color: var(--fg); box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
      .google-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; border: 1px solid var(--border); border-radius: var(--radius-btn); padding: 10px 12px; font-size: 14px; font-weight: 600; cursor: pointer; background: var(--surface); color: var(--fg); margin-top: 4px; }
      .g-icon { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 50%; background: #fff; border: 1px solid var(--border); color: #4285f4; font-weight: 700; font-size: 12px; }
      .auth-label { font-size: 12px; font-weight: 600; color: var(--fg); margin: 8px 0 3px; }
      .auth-switch { width: auto; margin: 10px auto 0; padding: 4px; display: block; background: none; border: 0; color: var(--muted); font-size: 13px; cursor: pointer; }
      .auth-switch:hover { color: var(--fg); background: none; }
      /* Footer: Đăng xuất / Hỗ trợ */
      .footer { display: flex; justify-content: center; gap: 18px; padding-top: 10px; margin-top: 4px; border-top: 1px solid var(--border); }
      .footer-link { width: auto; margin: 0; padding: 4px 6px; background: none; border: 0; color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer; }
      .footer-link:hover { color: var(--fg); background: none; }
      /* TIP-053 — màn "Hết hạn dùng thử" */
      .expired-box { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; text-align: center; padding: 28px 18px; background: var(--surface, #fff); border-radius: 12px; }
      .expired-title { font-size: 18px; font-weight: 700; color: var(--fg); }
      .expired-msg { font-size: 13px; color: var(--muted); line-height: 1.5; }
      .expired-link { color: var(--accent); text-decoration: underline; cursor: pointer; }
    </style>
  </head>
  <body>
    <div id="app"><p class="muted">Đang tải…</p></div>
    <script src="popup.js"></script>
  </body>
</html>
