<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyMovie</title>
    <style>
      /* ⚠️ PLACEHOLDER tokens — đồng bộ tinh thần với web, thay theo Figma sau. */
      :root {
        --primary: #4f46e5;
        --primary-hover: #4338ca;
        --fg: #18181b;
        --muted: #71717a;
        --border: #e4e4e7;
        --surface: #ffffff;
        --surface-muted: #f4f4f5;
        --radius: 0.5rem;
        --danger: #dc2626;
      }
      * { box-sizing: border-box; }
      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        font-family: ui-sans-serif, system-ui, "Segoe UI", sans-serif;
        color: var(--fg);
        background: var(--surface);
      }
      .title { font-size: 16px; font-weight: 700; color: var(--primary); margin: 0 0 4px; }
      .muted { color: var(--muted); font-size: 13px; }
      .row { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
      .row.clickable { cursor: pointer; border-radius: var(--radius); padding: 6px; margin: 4px -6px; transition: background 0.12s; }
      .row.clickable:hover { background: var(--surface-muted); }
      .avatar { width: 36px; height: 36px; border-radius: 999px; object-fit: cover; background: var(--primary); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; }
      .email { font-size: 14px; font-weight: 500; word-break: break-all; }
      .status { font-size: 13px; margin: 8px 0; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); }
      .status.expired { color: var(--danger); border-color: var(--danger); }
      .btn { width: 100%; border: 0; border-radius: var(--radius); padding: 9px 12px; font-size: 14px; font-weight: 500; cursor: pointer; background: var(--primary); color: #fff; margin-top: 8px; }
      .btn:hover { background: var(--primary-hover); }
      .btn.ghost { background: transparent; color: var(--fg); border: 1px solid var(--border); }
      .btn:disabled { opacity: 0.45; cursor: not-allowed; }
      /* Timer (TIP-014) */
      .timer { text-align: center; margin: 12px 0; padding: 14px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface-muted); }
      .timer-label { font-size: 13px; color: var(--muted); }
      .timer-time { font-size: 30px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: 1px; margin: 4px 0 12px; color: var(--fg); }
      .timer-controls { display: flex; gap: 8px; }
      .timer-btn { margin-top: 0; }
      /* Cài đặt phụ đề (TIP-015) */
      .settings { margin: 12px 0; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius); }
      .set-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
      .set-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 8px 0; }
      .set-label { font-size: 13px; }
      .set-val { font-size: 13px; font-variant-numeric: tabular-nums; min-width: 40px; text-align: right; }
      .set-slider { flex: 1; accent-color: var(--primary); }
      /* switch toggle */
      .switch { position: relative; display: inline-block; width: 38px; height: 22px; flex: none; }
      .switch input { opacity: 0; width: 0; height: 0; }
      .switch-slider { position: absolute; inset: 0; cursor: pointer; background: var(--border); border-radius: 999px; transition: 0.18s; }
      .switch-slider::before { content: ""; position: absolute; height: 16px; width: 16px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: 0.18s; }
      .switch input:checked + .switch-slider { background: var(--primary); }
      .switch input:checked + .switch-slider::before { transform: translateX(16px); }
      /* stepper − [px] + */
      .stepper { display: inline-flex; align-items: center; gap: 8px; }
      .step-btn { width: 28px; height: 28px; border: 1px solid var(--border); background: var(--surface); border-radius: var(--radius); font-size: 16px; font-weight: 600; cursor: pointer; color: var(--fg); line-height: 1; }
      .step-btn:hover:not(:disabled) { background: var(--surface-muted); }
      .step-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <div id="app"><p class="muted">Đang tải…</p></div>
    <script src="popup.js"></script>
  </body>
</html>
