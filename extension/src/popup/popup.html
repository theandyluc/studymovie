<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyMovie</title>
    <style>
      /* ⚠️ PLACEHOLDER tokens — đồng bộ tinh thần với web, thay theo Figma sau. */
      :root {
        --primary: #4f46e5;
        --primary-hover: #4338ca;
        --fg: #18181b;
        --muted: #71717a;
        --border: #e4e4e7;
        --surface: #ffffff;
        --surface-muted: #f4f4f5;
        --radius: 0.5rem;
        --danger: #dc2626;
      }
      * { box-sizing: border-box; }
      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        font-family: ui-sans-serif, system-ui, "Segoe UI", sans-serif;
        color: var(--fg);
        background: var(--surface);
      }
      .title { font-size: 16px; font-weight: 700; color: var(--primary); margin: 0 0 4px; }
      .muted { color: var(--muted); font-size: 13px; }
      .row { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
      .row.clickable { cursor: pointer; border-radius: var(--radius); padding: 6px; margin: 4px -6px; transition: background 0.12s; }
      .row.clickable:hover { background: var(--surface-muted); }
      .avatar { width: 36px; height: 36px; border-radius: 999px; object-fit: cover; background: var(--primary); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; }
      .email { font-size: 14px; font-weight: 500; word-break: break-all; }
      .status { font-size: 13px; margin: 8px 0; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); }
      .status.expired { color: var(--danger); border-color: var(--danger); }
      .btn { width: 100%; border: 0; border-radius: var(--radius); padding: 9px 12px; font-size: 14px; font-weight: 500; cursor: pointer; background: var(--primary); color: #fff; margin-top: 8px; }
      .btn:hover { background: var(--primary-hover); }
      .btn.ghost { background: transparent; color: var(--fg); border: 1px solid var(--border); }
      .btn:disabled { opacity: 0.45; cursor: not-allowed; }
      /* Timer (TIP-014) */
      .timer { text-align: center; margin: 12px 0; padding: 14px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface-muted); }
      .timer-label { font-size: 13px; color: var(--muted); }
      .timer-time { font-size: 30px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: 1px; margin: 4px 0 12px; color: var(--fg); }
      .timer-controls { display: flex; gap: 8px; }
      .timer-btn { margin-top: 0; }
    </style>
  </head>
  <body>
    <div id="app"><p class="muted">Đang tải…</p></div>
    <script src="popup.js"></script>
  </body>
</html>
